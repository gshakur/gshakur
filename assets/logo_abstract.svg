<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="abstractGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88" />
      <stop offset="100%" stop-color="#7000ff" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)" stroke="url(#abstractGradient)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Central Hexagon -->
    <path d="M50 35 L63 42.5 L63 57.5 L50 65 L37 57.5 L37 42.5 Z" stroke-width="6" />
    
    <!-- Radiating Tech Lines -->
    <path d="M50 25 V10" />
    <path d="M50 75 V90" />
    
    <path d="M72 38 L85 30" />
    <path d="M28 38 L15 30" />
    
    <path d="M72 62 L85 70" />
    <path d="M28 62 L15 70" />
    
    <!-- Inner Circuit Dot -->
    <circle cx="50" cy="50" r="5" fill="url(#abstractGradient)" stroke="none" />
    
    <!-- Outer Orbit Rings (Broken) -->
    <path d="M90 50 A 40 40 0 0 1 50 90" stroke-opacity="0.5" stroke-width="2" />
    <path d="M10 50 A 40 40 0 0 1 50 10" stroke-opacity="0.5" stroke-width="2" />
  </g>
</svg>
