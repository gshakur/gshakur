<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="dynamicGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88" />
      <stop offset="50%" stop-color="#00ffff" />
      <stop offset="100%" stop-color="#7000ff" />
    </linearGradient>
    <filter id="neonMotion" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feOffset dx="0" dy="0" result="offsetblur"/>
      <feFlood flood-color="#00ff88" flood-opacity="0.5" result="glowColor"/>
      <feComposite in="glowColor" in2="coloredBlur" operator="in" result="softGlow"/>
      <feMerge>
        <feMergeNode in="softGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g filter="url(#neonMotion)" transform="skewX(-10)">
    <!-- Dynamic G -->
    <path d="M45 30 L25 30 L15 45 L15 70 L40 85 L60 85" 
          fill="none" stroke="url(#dynamicGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Dynamic S Interlock -->
    <path d="M40 55 L65 55 L75 70 L55 85" 
          fill="none" stroke="url(#dynamicGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
          
    <path d="M85 30 L60 15 L35 15" 
          fill="none" stroke="url(#dynamicGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
          
    <!-- Connecting S curve top -->
    <path d="M85 30 L85 50 L65 65" 
          fill="none" stroke="url(#dynamicGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
          
    <!-- Accent Dots -->
    <circle cx="20" cy="20" r="3" fill="#00ff88" />
    <circle cx="80" cy="90" r="3" fill="#7000ff" />
  </g>
</svg>
